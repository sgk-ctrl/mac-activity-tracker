name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Tests (fixture-based, no Full Disk Access needed)
        run: python -m pytest -q
      - name: Smoke — sample data renders a dashboard
        run: |
          python sample/build_sample_data.py
          python build_dashboard.py --data sample/sample_data.json --out /tmp/dash.html
          test -s /tmp/dash.html
